version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: apex_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - E:/apex/qdrant:/qdrant/storage
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
      - QDRANT__SERVICE__ENABLE_TLS=false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G # Soft limit, Memmap handles the rest
